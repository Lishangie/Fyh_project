version: '3.8'
services:
  backend:
    build: .
    container_name: fyh_project_backend_local
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:rw
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOW_PLANTUML=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
  frontend:
    image: python:3.10-slim
    container_name: fyh_project_frontend_local
    working_dir: /app
    command: bash -lc "pip install --no-cache-dir -r frontend-requirements.txt && streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./:/app:rw
    env_file:
      - .env
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
